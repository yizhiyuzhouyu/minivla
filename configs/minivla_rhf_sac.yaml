# MiniVLA-RHF-SAC pipeline preset.
#
# Stage 1 still uses scripts/train.py with the normal MiniVLA/SFT arguments.
# Stages 2-3 use scripts/train_reward_model.py and scripts/train_sac.py.

base_checkpoint: outputs/so101_pi0_like/best.pt
rollout_jsonl:
  - outputs/rollouts
labels_jsonl: []
output_root: outputs/minivla_rhf_sac

reward_model:
  output_dir: outputs/minivla_rhf_sac/reward_model
  batch_size: 16
  epochs: 10
  lr: 0.0001
  weight_decay: 0.0001
  hidden_dim: null
  num_layers: 2
  dropout: 0.0

sac:
  output_dir: outputs/minivla_rhf_sac/sac
  batch_size: 16
  epochs: 5
  lr: 0.0003
  weight_decay: 0.0001
  residual_scale: 0.25
  gamma: 0.97
  tau: 0.005
  alpha: 0.01
  bc_weight: 0.05
