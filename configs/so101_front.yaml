dataset_repo_id: null
output_dir: outputs/so101_front
device: cuda
dtype: float32
batch_size: 8
num_workers: 4
epochs: 1
max_steps: 10000
lr: 0.0001
weight_decay: 0.0001
grad_clip_norm: 1.0
log_every: 10
save_every: 1000
seed: 0

normalize_state: true
normalize_action: true
delta_timestamps: true
fps: 30.0

use_hf_vision_encoder: false
freeze_vision_encoder: true
image_keys:
  - observation.images.front
image_size: [224, 224]
patch_size: 16
image_token_reduction: resampler
visual_resampler_layers: 1
hidden_dim: 256
num_heads: 8
num_dit_layers: 4
action_head: flow_matching
n_obs_steps: 2
chunk_size: 50
n_action_steps: 25
max_state_dim: 32
max_action_dim: 32
action_dim: 7
use_temporal_ensemble: false
temporal_ensemble_max_chunks: 8
temporal_ensemble_decay: 0.5
text_vocab_size: 49152
tokenizer_max_length: 48
num_inference_steps: 10
max_image_tokens: 196
use_episode_metadata: false
future_latent_loss_weight: 0.0
